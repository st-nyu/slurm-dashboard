<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLURM Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 { font-size: 1.4rem; color: #f8fafc; }
        .updated {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .summary {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .summary-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 12px 18px;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }
        .summary-card .count {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .summary-card .label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            background: #1e293b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: #334155;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #cbd5e1;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        td {
            padding: 10px 12px;
            border-top: 1px solid #334155;
            white-space: nowrap;
        }
        tr:hover td { background: #263348; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-running   { background: #065f46; color: #6ee7b7; }
        .badge-pending    { background: #713f12; color: #fde68a; }
        .badge-failed     { background: #7f1d1d; color: #fca5a5; }
        .badge-completed  { background: #374151; color: #9ca3af; }
        .badge-cancelled  { background: #4a1d6a; color: #d8b4fe; }
        .badge-timeout    { background: #7f1d1d; color: #fca5a5; }
        /* GPU utilization colors */
        .gpu-low { color: #6ee7b7; }
        .gpu-med { color: #fde68a; }
        .gpu-high { color: #fca5a5; }
        .gpu-cell {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .gpu-bar {
            width: 40px;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
            display: inline-block;
            vertical-align: middle;
        }
        .gpu-bar-fill {
            height: 100%;
            border-radius: 4px;
        }
        /* Sparkline */
        .sparkline { vertical-align: middle; }
        /* Log viewer */
        .log-toggle {
            background: #334155;
            color: #94a3b8;
            border: 1px solid #475569;
            border-radius: 4px;
            padding: 2px 8px;
            font-size: 0.72rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .log-toggle:hover { background: #475569; color: #e2e8f0; }
        .log-row td {
            padding: 0;
            border-top: none;
        }
        .log-container {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 6px;
            margin: 4px 12px 12px;
            max-height: 300px;
            overflow: auto;
        }
        .log-container pre {
            padding: 12px;
            margin: 0;
            font-family: "SF Mono", "Fira Code", "Consolas", monospace;
            font-size: 0.75rem;
            line-height: 1.5;
            color: #cbd5e1;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #f87171;
        }
        .refresh-note {
            text-align: center;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #475569;
        }
        /* Auth overlay */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #auth-overlay h2 { margin-bottom: 16px; }
        #auth-overlay input {
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            width: 240px;
        }
        #auth-overlay button {
            margin-top: 12px;
            padding: 10px 24px;
            border-radius: 6px;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        #auth-overlay button:hover { background: #2563eb; }
        #auth-error {
            color: #f87171;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.1rem; }
            table { font-size: 0.78rem; }
            td, th { padding: 8px 6px; }
        }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <h2>SLURM Dashboard</h2>
        <input type="password" id="auth-input" placeholder="Enter password" autofocus>
        <button onclick="checkAuth()">Enter</button>
        <div id="auth-error"></div>
    </div>

    <div id="app" style="display:none;">
        <header>
            <h1>SLURM Dashboard</h1>
            <div class="updated" id="updated"></div>
        </header>
        <div class="summary" id="summary"></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Job ID</th>
                        <th>Name</th>
                        <th>State</th>
                        <th>Partition</th>
                        <th>Nodes</th>
                        <th>GPUs</th>
                        <th>GPU Util</th>
                        <th>Elapsed</th>
                        <th>Time Limit</th>
                        <th>Submitted</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="jobs-body"></tbody>
            </table>
        </div>
        <div class="refresh-note">Auto-refreshes every 60 seconds</div>
    </div>

    <script>
        const COL_COUNT = 11;

        // --- Auth ---
        const PASSWORD_HASH = "9f86d081884c7d659a2feaa0c55ad015a3bf4f1b2b0b822cd15d6c15b0f00a08";

        async function sha256(str) {
            const buf = await crypto.subtle.digest("SHA-256",
                new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf))
                .map(b => b.toString(16).padStart(2, "0")).join("");
        }

        async function checkAuth() {
            const input = document.getElementById("auth-input").value;
            const hash = await sha256(input);
            if (hash === PASSWORD_HASH) {
                sessionStorage.setItem("authed", "1");
                showApp();
            } else {
                document.getElementById("auth-error").textContent = "Incorrect password";
            }
        }

        document.getElementById("auth-input").addEventListener("keydown", e => {
            if (e.key === "Enter") checkAuth();
        });

        function showApp() {
            document.getElementById("auth-overlay").style.display = "none";
            document.getElementById("app").style.display = "block";
            loadData();
        }

        if (sessionStorage.getItem("authed") === "1") {
            showApp();
        }

        // --- Helpers ---
        function badgeClass(state) {
            const s = state.toUpperCase();
            if (s.includes("RUNNING")) return "badge-running";
            if (s.includes("PENDING")) return "badge-pending";
            if (s.includes("FAILED"))  return "badge-failed";
            if (s.includes("TIMEOUT")) return "badge-timeout";
            if (s.includes("CANCEL"))  return "badge-cancelled";
            if (s.includes("COMPLET")) return "badge-completed";
            return "badge-completed";
        }

        function formatTime(iso) {
            if (!iso) return "-";
            const d = new Date(iso);
            return d.toLocaleString(undefined, {
                month: "short", day: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
        }

        function gpuUtilColor(pct) {
            if (pct < 50) return "gpu-low";
            if (pct < 80) return "gpu-med";
            return "gpu-high";
        }

        function gpuBarColor(pct) {
            if (pct < 50) return "#6ee7b7";
            if (pct < 80) return "#fde68a";
            return "#fca5a5";
        }

        function renderGpuCell(job, gpuHistory) {
            if (job.gpu_avg_util == null) return "-";
            const pct = job.gpu_avg_util;
            const colorClass = gpuUtilColor(pct);
            const barColor = gpuBarColor(pct);

            // Tooltip with per-GPU current stats
            let title = `Avg: ${pct}%`;
            if (job.gpu_current) {
                title += "\n" + job.gpu_current.map((g, i) =>
                    `GPU ${i}: ${g.util}% util, ${g.mem_used}/${g.mem_total} MiB`
                ).join("\n");
            }

            let sparkline = "";
            const hist = gpuHistory && gpuHistory[job.job_id];
            if (hist && hist.length > 1) {
                sparkline = renderSparkline(hist);
            }

            return `<span class="gpu-cell" title="${escapeAttr(title)}">` +
                `<span class="${colorClass}">${pct}%</span>` +
                `<span class="gpu-bar"><span class="gpu-bar-fill" style="width:${Math.min(pct, 100)}%;background:${barColor}"></span></span>` +
                `${sparkline}</span>`;
        }

        function renderSparkline(samples) {
            // Extract average util per sample
            const points = samples.map(s => {
                const avg = s.gpus.reduce((sum, g) => sum + g.util, 0) / s.gpus.length;
                return avg;
            });
            if (points.length < 2) return "";

            const w = 48, h = 16, pad = 1;
            const max = 100; // GPU util is 0-100
            const step = (w - 2 * pad) / (points.length - 1);

            const coords = points.map((v, i) => {
                const x = pad + i * step;
                const y = h - pad - ((v / max) * (h - 2 * pad));
                return `${x.toFixed(1)},${y.toFixed(1)}`;
            });

            const lastPt = points[points.length - 1];
            const color = gpuBarColor(lastPt);

            return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">` +
                `<polyline points="${coords.join(" ")}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>` +
                `</svg>`;
        }

        function escapeHtml(str) {
            const div = document.createElement("div");
            div.textContent = str;
            return div.innerHTML;
        }

        function escapeAttr(str) {
            return str.replace(/&/g, "&amp;").replace(/"/g, "&quot;")
                      .replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function toggleLog(jobId) {
            const existing = document.getElementById("log-" + jobId);
            if (existing) {
                existing.remove();
                return;
            }
            const trigger = document.querySelector(`[data-log-job="${jobId}"]`);
            if (!trigger) return;
            const jobRow = trigger.closest("tr");
            const logData = trigger.getAttribute("data-log");
            if (!logData) return;

            const tr = document.createElement("tr");
            tr.id = "log-" + jobId;
            tr.className = "log-row";
            tr.innerHTML = `<td colspan="${COL_COUNT}">
                <div class="log-container">
                    <pre>${escapeHtml(logData)}</pre>
                </div>
            </td>`;
            jobRow.after(tr);
        }

        // --- Dashboard ---
        async function loadData() {
            const body = document.getElementById("jobs-body");
            const summary = document.getElementById("summary");
            try {
                const resp = await fetch("data.json?t=" + Date.now());
                if (!resp.ok) throw new Error("No data yet");
                const data = await resp.json();

                const gpuHistory = data.gpu_history || {};

                // Updated timestamp
                document.getElementById("updated").textContent =
                    "Updated: " + formatTime(data.updated_at);

                // Summary cards
                const counts = {};
                data.jobs.forEach(j => {
                    const s = j.state.toUpperCase();
                    let key = "OTHER";
                    if (s.includes("RUNNING")) key = "RUNNING";
                    else if (s.includes("PENDING")) key = "PENDING";
                    else if (s.includes("COMPLET")) key = "COMPLETED";
                    else if (s.includes("FAILED") || s.includes("TIMEOUT")) key = "FAILED";
                    else if (s.includes("CANCEL")) key = "CANCELLED";
                    counts[key] = (counts[key] || 0) + 1;
                });

                const order = ["RUNNING", "PENDING", "COMPLETED", "FAILED", "CANCELLED"];
                summary.innerHTML = order
                    .filter(k => counts[k])
                    .map(k => `<div class="summary-card">
                        <div class="count">${counts[k]}</div>
                        <div class="label">${k}</div>
                    </div>`).join("");

                // Job rows
                if (data.jobs.length === 0) {
                    body.innerHTML = `<tr><td colspan="${COL_COUNT}" class="empty">No jobs found</td></tr>`;
                    return;
                }

                // Sort: running first, then pending, then by submit time desc
                const stateOrder = { RUNNING: 0, PENDING: 1 };
                data.jobs.sort((a, b) => {
                    const sa = stateOrder[a.state.toUpperCase()] ?? 2;
                    const sb = stateOrder[b.state.toUpperCase()] ?? 2;
                    if (sa !== sb) return sa - sb;
                    return (b.submit_time || "").localeCompare(a.submit_time || "");
                });

                body.innerHTML = data.jobs.map(j => {
                    const logBtn = j.log_tail
                        ? `<button class="log-toggle" data-log-job="${j.job_id}" data-log="${escapeAttr(j.log_tail)}" onclick="toggleLog('${j.job_id}')">Logs</button>`
                        : "-";
                    return `<tr>
                        <td>${j.job_id}</td>
                        <td>${j.name}</td>
                        <td><span class="badge ${badgeClass(j.state)}">${j.state}</span></td>
                        <td>${j.partition || "-"}</td>
                        <td>${j.nodes || "-"}</td>
                        <td>${j.gpus || "-"}</td>
                        <td>${renderGpuCell(j, gpuHistory)}</td>
                        <td>${j.elapsed || "-"}</td>
                        <td>${j.time_limit || "-"}</td>
                        <td>${formatTime(j.submit_time)}</td>
                        <td>${logBtn}</td>
                    </tr>`;
                }).join("");

            } catch (e) {
                body.innerHTML = `<tr><td colspan="${COL_COUNT}" class="error">
                    Could not load data. Run update.sh to generate data.json
                </td></tr>`;
            }
        }

        // Auto-refresh every 60 seconds
        setInterval(loadData, 60000);
    </script>
</body>
</html>
