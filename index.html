<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SLURM Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            min-height: 100vh;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        h1 { font-size: 1.4rem; color: #f8fafc; }
        .updated {
            font-size: 0.8rem;
            color: #94a3b8;
        }
        .summary {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .summary-card {
            background: #1e293b;
            border-radius: 8px;
            padding: 12px 18px;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }
        .summary-card .count {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .summary-card .label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 8px;
            background: #1e293b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        th {
            background: #334155;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #cbd5e1;
            white-space: nowrap;
            position: sticky;
            top: 0;
        }
        td {
            padding: 10px 12px;
            border-top: 1px solid #334155;
            white-space: nowrap;
        }
        tr:hover td { background: #263348; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-running   { background: #065f46; color: #6ee7b7; }
        .badge-pending    { background: #713f12; color: #fde68a; }
        .badge-failed     { background: #7f1d1d; color: #fca5a5; }
        .badge-completed  { background: #374151; color: #9ca3af; }
        .badge-cancelled  { background: #4a1d6a; color: #d8b4fe; }
        .badge-timeout    { background: #7f1d1d; color: #fca5a5; }
        .empty {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .error {
            text-align: center;
            padding: 40px;
            color: #f87171;
        }
        .refresh-note {
            text-align: center;
            margin-top: 12px;
            font-size: 0.75rem;
            color: #475569;
        }
        /* Auth overlay */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        #auth-overlay h2 { margin-bottom: 16px; }
        #auth-overlay input {
            padding: 10px 16px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 1rem;
            width: 240px;
        }
        #auth-overlay button {
            margin-top: 12px;
            padding: 10px 24px;
            border-radius: 6px;
            border: none;
            background: #3b82f6;
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        #auth-overlay button:hover { background: #2563eb; }
        #auth-error {
            color: #f87171;
            margin-top: 8px;
            font-size: 0.85rem;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            h1 { font-size: 1.1rem; }
            table { font-size: 0.78rem; }
            td, th { padding: 8px 6px; }
        }
    </style>
</head>
<body>
    <div id="auth-overlay">
        <h2>SLURM Dashboard</h2>
        <input type="password" id="auth-input" placeholder="Enter password" autofocus>
        <button onclick="checkAuth()">Enter</button>
        <div id="auth-error"></div>
    </div>

    <div id="app" style="display:none;">
        <header>
            <h1>SLURM Dashboard</h1>
            <div class="updated" id="updated"></div>
        </header>
        <div class="summary" id="summary"></div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Job ID</th>
                        <th>Name</th>
                        <th>State</th>
                        <th>Partition</th>
                        <th>Nodes</th>
                        <th>GPUs</th>
                        <th>Elapsed</th>
                        <th>Time Limit</th>
                        <th>Submitted</th>
                    </tr>
                </thead>
                <tbody id="jobs-body"></tbody>
            </table>
        </div>
        <div class="refresh-note">Auto-refreshes every 60 seconds</div>
    </div>

    <script>
        // --- Auth ---
        // To set/change the password, update this SHA-256 hash.
        // Generate with: echo -n "yourpassword" | sha256sum
        // Default: "changeme"
        const PASSWORD_HASH = "057ba03d6c44104863dc7361fe4578965d1887360f90a0895882e58a6248fc86";

        async function sha256(str) {
            const buf = await crypto.subtle.digest("SHA-256",
                new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf))
                .map(b => b.toString(16).padStart(2, "0")).join("");
        }

        async function checkAuth() {
            const input = document.getElementById("auth-input").value;
            const hash = await sha256(input);
            if (hash === PASSWORD_HASH) {
                sessionStorage.setItem("authed", "1");
                showApp();
            } else {
                document.getElementById("auth-error").textContent = "Incorrect password";
            }
        }

        document.getElementById("auth-input").addEventListener("keydown", e => {
            if (e.key === "Enter") checkAuth();
        });

        function showApp() {
            document.getElementById("auth-overlay").style.display = "none";
            document.getElementById("app").style.display = "block";
            loadData();
        }

        if (sessionStorage.getItem("authed") === "1") {
            showApp();
        }

        // --- Dashboard ---
        function badgeClass(state) {
            const s = state.toUpperCase();
            if (s.includes("RUNNING")) return "badge-running";
            if (s.includes("PENDING")) return "badge-pending";
            if (s.includes("FAILED"))  return "badge-failed";
            if (s.includes("TIMEOUT")) return "badge-timeout";
            if (s.includes("CANCEL"))  return "badge-cancelled";
            if (s.includes("COMPLET")) return "badge-completed";
            return "badge-completed";
        }

        function formatTime(iso) {
            if (!iso) return "-";
            const d = new Date(iso);
            return d.toLocaleString(undefined, {
                month: "short", day: "numeric",
                hour: "2-digit", minute: "2-digit"
            });
        }

        async function loadData() {
            const body = document.getElementById("jobs-body");
            const summary = document.getElementById("summary");
            try {
                const resp = await fetch("data.json?t=" + Date.now());
                if (!resp.ok) throw new Error("No data yet");
                const data = await resp.json();

                // Updated timestamp
                document.getElementById("updated").textContent =
                    "Updated: " + formatTime(data.updated_at);

                // Summary cards
                const counts = {};
                data.jobs.forEach(j => {
                    const s = j.state.toUpperCase();
                    let key = "OTHER";
                    if (s.includes("RUNNING")) key = "RUNNING";
                    else if (s.includes("PENDING")) key = "PENDING";
                    else if (s.includes("COMPLET")) key = "COMPLETED";
                    else if (s.includes("FAILED") || s.includes("TIMEOUT")) key = "FAILED";
                    else if (s.includes("CANCEL")) key = "CANCELLED";
                    counts[key] = (counts[key] || 0) + 1;
                });

                const order = ["RUNNING", "PENDING", "COMPLETED", "FAILED", "CANCELLED"];
                summary.innerHTML = order
                    .filter(k => counts[k])
                    .map(k => `<div class="summary-card">
                        <div class="count">${counts[k]}</div>
                        <div class="label">${k}</div>
                    </div>`).join("");

                // Job rows
                if (data.jobs.length === 0) {
                    body.innerHTML = '<tr><td colspan="9" class="empty">No jobs found</td></tr>';
                    return;
                }

                // Sort: running first, then pending, then by submit time desc
                const stateOrder = { RUNNING: 0, PENDING: 1 };
                data.jobs.sort((a, b) => {
                    const sa = stateOrder[a.state.toUpperCase()] ?? 2;
                    const sb = stateOrder[b.state.toUpperCase()] ?? 2;
                    if (sa !== sb) return sa - sb;
                    return (b.submit_time || "").localeCompare(a.submit_time || "");
                });

                body.innerHTML = data.jobs.map(j => `<tr>
                    <td>${j.job_id}</td>
                    <td>${j.name}</td>
                    <td><span class="badge ${badgeClass(j.state)}">${j.state}</span></td>
                    <td>${j.partition || "-"}</td>
                    <td>${j.nodes || "-"}</td>
                    <td>${j.gpus || "-"}</td>
                    <td>${j.elapsed || "-"}</td>
                    <td>${j.time_limit || "-"}</td>
                    <td>${formatTime(j.submit_time)}</td>
                </tr>`).join("");

            } catch (e) {
                body.innerHTML = `<tr><td colspan="9" class="error">
                    Could not load data. Run update.sh to generate data.json
                </td></tr>`;
            }
        }

        // Auto-refresh every 60 seconds
        setInterval(loadData, 60000);
    </script>
</body>
</html>
